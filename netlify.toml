# Netlify build config for the Next.js dashboard in this npm-workspaces monorepo.
# base = apps/web so Netlify builds the web app; it auto-detects the workspace
# root (package-lock above) and installs @trading/core. The Next.js plugin adds
# SSR/middleware support.
[build]
  base = "apps/web"
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"
